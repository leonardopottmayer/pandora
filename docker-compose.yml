# Project name is per-environment (pandora-prod, pandora-staging, ...) so each
# environment gets its own isolated containers and network.
name: ${COMPOSE_PROJECT_NAME:-pandora}

# The database lives in a shared per-tier stack (infra/postgres), reachable on
# the external "${TIER_NETWORK}" network as "${DB_HOST}". Bring that up first.

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/leonardopottmayer/pandora-backend:latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    networks:
      - default
      - tier
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_HTTP_PORTS: "8080"
      Tars__Data__Connections__identity__ConnectionString: "Host=${DB_HOST};Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Tars__Data__Connections__notifications__ConnectionString: "Host=${DB_HOST};Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Tars__Data__Connections__finances__ConnectionString: "Host=${DB_HOST};Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Tars__Security__Identity__Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Pandora__Identity__Mfa__EncryptionKey: ${MFA_ENCRYPTION_KEY}
      # SMTP target. Staging -> mailhog (capture); prod -> a real provider.
      Tars__Communication__Email__Smtp__Host: ${SMTP_HOST:-mailhog}
      Tars__Communication__Email__Smtp__Port: ${SMTP_PORT:-1025}

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/leonardopottmayer/pandora-frontend:latest}
    build:
      context: ./client-web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

  # Email catcher. Only starts when the "mailhog" profile is active
  # (COMPOSE_PROFILES=mailhog in the env file) — e.g. staging, not prod.
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    profiles: ["mailhog"]
    ports:
      # Web UI, exposed to the LAN. SMTP (1025) stays internal to the network.
      - "${MAILHOG_UI_PORT:-8025}:8025"

networks:
  # Shared per-tier network where the DB stack lives. Created once:
  #   docker network create staging   (and: docker network create prod)
  tier:
    name: ${TIER_NETWORK}
    external: true
